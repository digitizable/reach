<?xml version="1.0" encoding="UTF-8"?>
<!-- Spectre tray: disconnected — red open lock (not Mullvad-branded) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Body -->
  <rect x="4.5" y="10.5" width="15" height="11" rx="2.5" fill="#dc2626"/>
  <!--
    Open shackle as one continuous stroke: left leg fixed to the body,
    full arch (same geometry as the locked icon), right leg stops short
    of the body so a clear gap reads as unlocked — not a broken cut.
  -->
  <path d="M8 10.5V7.2c0-2.2 1.8-4 4-4s4 1.8 4 4V8.2"
        fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="12" cy="15.2" r="1.35" fill="#450a0a"/>
  <rect x="11.25" y="15.5" width="1.5" height="3.2" rx="0.5" fill="#450a0a"/>
</svg>
