<?xml version="1.0" encoding="UTF-8"?>
<!-- Connected — closed lock. Body + stroke shackle + keyhole (basic shapes). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Body -->
  <rect x="5" y="10.5" width="14" height="10.5" rx="2.2" fill="#16a34a"/>
  <!-- Closed shackle (same geometry family as unlocked) -->
  <path d="M8.2 10.5V7.4c0-2.1 1.7-3.8 3.8-3.8s3.8 1.7 3.8 3.8v3.1"
        fill="none" stroke="#16a34a" stroke-width="2.1" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="12" cy="15.2" r="1.25" fill="#052e16"/>
  <rect x="11.35" y="15.5" width="1.3" height="2.8" rx="0.45" fill="#052e16"/>
</svg>
